name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Build & verify backend Docker image ────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: abibas-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── Job 2: Build & verify frontend Docker image ───────────────────────────
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: abibas-frontend:ci
          build-args: |
            API_URL=http://backend:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Job 3: Deploy to production (main branch only, after CI passes) ────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Only deploy on direct pushes/merges to main, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          # Stop the script immediately if any command fails
          script_stop: true
          script: |
            set -euo pipefail

            cd ${{ vars.DEPLOY_PATH }}

            echo "──────────────────────────────────────"
            echo " Abibas WMS — Deploying..."
            echo " Commit: ${{ github.sha }}"
            echo " Triggered by: ${{ github.actor }}"
            echo "──────────────────────────────────────"

            echo "==> [1/5] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> [2/5] Rebuilding and starting services..."
            docker compose -f docker-compose.prod.yml up --build -d --remove-orphans

            echo "==> [3/5] Waiting for backend to be healthy (up to 90s)..."
            timeout 90 bash -c '
              until docker compose -f docker-compose.prod.yml exec -T backend \
                python -c "import urllib.request; urllib.request.urlopen('"'"'http://127.0.0.1:8000/health'"'"')" \
                2>/dev/null; do
                echo "  backend not ready yet, retrying in 5s..."
                sleep 5
              done
            '

            echo "==> [4/5] Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend uv run alembic upgrade head

            echo "==> [5/5] Deployment complete!"
            docker compose -f docker-compose.prod.yml ps

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to production FAILED for commit ${{ github.sha }}"
          echo "::error::Check the SSH deploy step above for the root cause."
