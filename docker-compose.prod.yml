# Production stack — standalone file (no merge with docker-compose.yml).
# Backend is internal-only; Nginx proxies to 127.0.0.1:3010 (host port).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      PORT: 8000
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://backend:8000
    restart: unless-stopped
    ports:
      - '127.0.0.1:3010:3000'
    depends_on:
      - backend
    networks:
      - app

networks:
  app:
