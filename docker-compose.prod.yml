# Production override — only frontend is reachable from the host.
# Nginx proxies to 127.0.0.1:3000; backend stays on the Docker network only.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  backend:
    ports: !reset []

  frontend:
    ports: !reset
      - '127.0.0.1:3000:3000'
